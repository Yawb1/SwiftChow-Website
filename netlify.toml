# Netlify configuration for SWIFT CHOW frontend

[build]
publish = "public"
command = "echo 'No build required for static site'"

# Pretty URLs - redirect .html to clean URLs
[[redirects]]
from = "/:splat.html"
to = "/:splat"
status = 301
force = false

# 404 fallback
[[redirects]]
from = "/*"
to = "/index.html"
status = 404

[dev]
command = "python -m http.server 8000"
port = 8000

[[headers]]
for = "/*"
[headers.values]
Access-Control-Allow-Origin = "https://swift-chow-backend.onrender.com"
Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
Access-Control-Allow-Headers = "Content-Type, Authorization"

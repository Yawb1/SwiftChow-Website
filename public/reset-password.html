    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #1F2937 0%, #111827 50%, #0F0F0F 100%);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.1) 0%, transparent 50%);

        }
        @keyframes pulse {

            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;

        [data-theme="dark"] .auth-card {

            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header .logo {
            display: inline-flex; align-items: center; gap: 0.5rem;
            margin-bottom: 1.5rem; text-decoration: none;
        }
        .auth-header .logo-icon { width: 50px; height: 50px; overflow: hidden; border-radius: 12px; }
        .auth-header .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
        .auth-header .logo-text { font-size: 1.5rem; font-weight: 800; color: #DC2626; }
        .auth-header .logo-text span { color: #111827; }
        [data-theme="dark"] .auth-header .logo-text span { color: #F9FAFB; }
        .auth-header h1 { font-size: 1.75rem; font-weight: 700; color: #111827; margin-bottom: 0.5rem; }
        [data-theme="dark"] .auth-header h1 { color: #F9FAFB; }
        .auth-header p { color: #6B7280; }
        .auth-form .form-group { margin-bottom: 1.25rem; }
        .auth-form label { display: block; font-weight: 500; color: #374151; margin-bottom: 0.5rem; font-size: 0.9rem; }
        [data-theme="dark"] .auth-form label { color: #E5E7EB; }
        .auth-form input {
            width: 100%; padding: 0.875rem 1rem; border: 2px solid #E5E7EB;
            border-radius: 12px; font-size: 1rem; background: #F9FAFB; color: #111827;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] .auth-form input { background: #252525; border-color: #374151; color: #F9FAFB; }
        .auth-form input:focus { outline: none; border-color: #DC2626; background: white; box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1); }
        [data-theme="dark"] .auth-form input:focus { background: #1A1A1A; }
        .btn-primary {
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            color: white; border: none; padding: 1rem 2rem; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%;

        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(220, 38, 38, 0.4); }
        .auth-footer { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB; }
        [data-theme="dark"] .auth-footer { border-top-color: #374151; }
        .auth-footer a { color: #DC2626; font-weight: 600; text-decoration: none; }
        .password-hint { font-size: 0.8rem; color: #9CA3AF; margin-top: 0.5rem; }
        .auth-theme-toggle {

            border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.3s ease; z-index: 100;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 2rem 1.5rem; margin: 1rem; }
            .auth-form input { font-size: 16px; }

<body data-page="reset-password">
    <main id="main-content">
    <div class="auth-container">
        <button class="auth-theme-toggle dark-mode-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
        </button>
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <img src="logo.png" alt="Swift Chow" style="height: 45px; width: auto;" width="45" height="45">
                    </div>
                    <span class="logo-text">SWIFT <span>CHOW</span></span>
                </a>
                <h1>Reset Your Password</h1>
                <p>Enter your new password below</p>
            </div>
            <form class="auth-form" id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="8">
                        <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility" onclick="togglePasswordVisibility('password', event)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary, #9CA3AF); font-size: 1.1rem;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p class="password-hint">Minimum 8 characters with at least 1 letter, 1 number, and 1 symbol</p>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="8">
                        <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility" onclick="togglePasswordVisibility('confirmPassword', event)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary, #9CA3AF); font-size: 1.1rem;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-lock"></i> Reset Password
                </button>
            </form>
            <div class="auth-footer">
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>
    </main>
    <script src="js/data.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/modals.js" defer></script>
    <script src="js/main.js" defer></script>
    <script>
    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showToast('Invalid reset link. Please request a new one.', 'error');
            return;
        }
        if (password !== confirmPassword) {
            showToast('Passwords do not match', 'error');
            return;
        }
        if (password.length < 8) {
            showToast('Password must be at least 8 characters', 'error');
            return;
        }

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            const data = await response.json();

            if (data.success) {
                showToast('Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                showToast(data.error?.message || 'Failed to reset password', 'error');
            }
        } catch (error) {
            showToast('An error occurred. Please try again.', 'error');
        }
    });
    </script>
